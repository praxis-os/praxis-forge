name: CodeQL

# CodeQL is informational (not a required merge check).
# Findings are visible in the Security tab and must be triaged within 7 days (D85).
#
# Automatic triggers are currently disabled: CodeQL result upload requires
# GitHub Advanced Security on private repos. Re-enable `pull_request` and
# `schedule` triggers when the repo is flipped to public (see PR #4
# post-merge checklist).
on:
  workflow_dispatch:
  # pull_request:
  #   branches: [main]
  # schedule:
  #   # Weekly on Monday at 05:00 UTC
  #   - cron: "0 5 * * 1"

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
