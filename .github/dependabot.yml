version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      # Bare prefix only: combining `prefix: "chore(deps)"` with
      # `include: scope` makes Dependabot emit `chore(deps)(deps): ...`,
      # which is invalid Conventional Commits and fails commitsar.
      prefix: "chore(deps)"
    labels:
      - dependencies
      - go

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      # See note above; same rationale for dropping `include: scope`.
      prefix: "chore(ci)"
    labels:
      - dependencies
      - github-actions
