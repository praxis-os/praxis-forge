version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      # Prefix must NOT contain parentheses: Dependabot auto-appends
      # `(deps)` as a scope when the prefix already has a parenthesised
      # group, producing invalid Conventional Commits like
      # `chore(deps)(deps): …`. Keep the prefix as a bare type and let
      # `include: scope` add the single scope Dependabot wants.
      prefix: "chore"
      include: scope
    labels:
      - dependencies
      - go

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      # Use `ci` type so CI-dep bumps are distinguishable in git log
      # from code-dep bumps (`chore`). Both are omitted from the
      # release-please changelog by default. See note above on parens.
      prefix: "ci"
      include: scope
    labels:
      - dependencies
      - github-actions
