apiVersion: forge.praxis-os.dev/v0
kind: AgentSpec
metadata:
  id: mcp.fixture.stdio-env
  version: 0.1.0
provider:
  ref: provider.min@1.0.0
prompt:
  system:
    ref: prompt.sys@1.0.0
mcpImports:
  - ref: mcp.binding@1.0.0
    config:
      id: fs
      connection:
        transport: stdio
        command:
          - "/bin/true"
        env:
          MCP_ROOT: /tmp/demo
      trust:
        tier: low
        owner: demo
      onNewTool: block
